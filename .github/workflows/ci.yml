name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  # Skip env validation during build (no real secrets in CI)
  SKIP_ENV_VALIDATION: "true"
  # Turbo remote cache token (optional — set in repo secrets)
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  ci:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # ── Node.js ─────────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ── pnpm ────────────────────────────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      # ── Cache pnpm store ─────────────────────────────────────────────────────
      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      # ── Install dependencies ─────────────────────────────────────────────────
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Lint ─────────────────────────────────────────────────────────────────
      - name: Lint
        run: pnpm lint

      # ── Typecheck ────────────────────────────────────────────────────────────
      - name: Typecheck
        run: pnpm typecheck

      # ── Unit + PBT tests ─────────────────────────────────────────────────────
      - name: Test
        run: pnpm test
        env:
          NODE_ENV: test

      # ── Build ────────────────────────────────────────────────────────────────
      - name: Build
        run: pnpm build
        env:
          NODE_ENV: production
          # Minimal env for Next.js build (all validated vars need values)
          NEXT_PUBLIC_SITE_URL: "http://localhost:3000"
          NEXT_PUBLIC_SITE_NAME: "Whitehouse"
