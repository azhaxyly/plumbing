name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  build-and-push:
    name: Build & Push to GHCR
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Docker metadata (web)
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/web
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Docker metadata (worker)
        id: meta-worker
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/worker
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push (web)
        uses: docker/build-push-action@v5
        with:
          context: .
          target: web
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          build-args: |
            NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_SITE_NAME=${{ secrets.NEXT_PUBLIC_SITE_NAME }}
            S3_PUBLIC_URL=${{ secrets.S3_PUBLIC_URL }}
          cache-from: type=registry,ref=ghcr.io/${{ env.IMAGE_NAME }}/web:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ env.IMAGE_NAME }}/web:buildcache,mode=max

      - name: Build and push (worker)
        uses: docker/build-push-action@v5
        with:
          context: .
          target: worker
          push: true
          tags: ${{ steps.meta-worker.outputs.tags }}
          build-args: |
            NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_SITE_NAME=${{ secrets.NEXT_PUBLIC_SITE_NAME }}
            S3_PUBLIC_URL=${{ secrets.S3_PUBLIC_URL }}
          cache-from: type=registry,ref=ghcr.io/${{ env.IMAGE_NAME }}/worker:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ env.IMAGE_NAME }}/worker:buildcache,mode=max

  deploy:
    name: Deploy to VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script_stop: true
          script: |
            SHA_TAG="sha-$(echo '${{ github.sha }}' | cut -c1-7)"
            /opt/plumbing/deploy.sh "$SHA_TAG"
