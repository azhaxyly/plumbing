# Production stack — single VPS, one internal network, Caddy as the only public
# entrypoint (auto-HTTPS). All config comes from a single source: infra/.env.production
# (passed to every service via env_file — no per-service .env files in prod).
#
# Build images BEFORE starting infra (4 GB box: build must not compete with
# Postgres/Meili/MinIO for RAM). See the deploy runbook.
name: timsan

services:
  # ── Public edge: TLS termination + reverse proxy ────────────────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    env_file: ./.env.production # provides SITE_DOMAIN / CDN_DOMAIN to the Caddyfile
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
    networks: [internal]

  # ── One-shot DB migrations (prisma migrate deploy), runs before web/worker ──
  migrate:
    build:
      context: ..
      dockerfile: Dockerfile
      target: worker # worker image already has the Prisma CLI + schema + migrations
    command:
      [
        "packages/db/node_modules/.bin/prisma",
        "migrate",
        "deploy",
        "--schema",
        "packages/db/prisma/schema.prisma",
      ]
    env_file: ./.env.production
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    networks: [internal]

  # ── Next.js app ─────────────────────────────────────────────────────────────
  web:
    build:
      context: ..
      dockerfile: Dockerfile
      target: web
      args:
        NEXT_PUBLIC_SITE_URL: "${NEXT_PUBLIC_SITE_URL}"
        NEXT_PUBLIC_SITE_NAME: "${NEXT_PUBLIC_SITE_NAME}"
        S3_PUBLIC_URL: "${S3_PUBLIC_URL}"
    restart: unless-stopped
    env_file: ./.env.production
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks: [internal]

  # ── BullMQ background worker (notifications, search indexing) ────────────────
  worker:
    build:
      context: ..
      dockerfile: Dockerfile
      target: worker
    restart: unless-stopped
    env_file: ./.env.production
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [internal]

  # ── Infrastructure (not published to the host — internal network only) ──────
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    env_file: ./.env.production # POSTGRES_USER / POSTGRES_PASSWORD / POSTGRES_DB
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  meilisearch:
    image: getmeili/meilisearch:v1.11.3
    restart: unless-stopped
    env_file: ./.env.production # MEILI_MASTER_KEY
    environment:
      MEILI_ENV: production
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    env_file: ./.env.production # MINIO_ROOT_USER / MINIO_ROOT_PASSWORD
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  # ── One-shot: create the public `media` bucket + CORS ───────────────────────
  minio-init:
    image: minio/mc:latest
    restart: "no"
    env_file: ./.env.production
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 \"$$MINIO_ROOT_USER\" \"$$MINIO_ROOT_PASSWORD\";
        mc mb --ignore-existing local/media;
        mc anonymous set public local/media;
        printf '<?xml version=\"1.0\" encoding=\"UTF-8\"?><CORSConfiguration><CORSRule><AllowedOrigin>*</AllowedOrigin><AllowedMethod>GET</AllowedMethod><AllowedMethod>PUT</AllowedMethod><AllowedMethod>POST</AllowedMethod><AllowedMethod>DELETE</AllowedMethod><AllowedMethod>HEAD</AllowedMethod><AllowedHeader>*</AllowedHeader><ExposeHeader>ETag</ExposeHeader><MaxAgeSeconds>3600</MaxAgeSeconds></CORSRule></CORSConfiguration>' > /tmp/cors.xml;
        mc cors set local/media /tmp/cors.xml;
        echo 'MinIO bucket media ready (public + CORS)';
      "
    networks: [internal]

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
  minio_data:
  caddy_data:
  caddy_config:
